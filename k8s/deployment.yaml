apiVersion: apps/v1
kind: Deployment
metadata:
  name: warmdiet
  namespace: warmdiet
  labels:
    app: warmdiet
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: warmdiet
  template:
    metadata:
      labels:
        app: warmdiet
        tier: backend
    spec:
      containers:
      - name: warmdiet
        image: registry.cn-hangzhou.aliyuncs.com/your-namespace/warmdiet:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: warmdiet-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: warmdiet-config
              key: PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: warmdiet-config
              key: LOG_LEVEL
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: warmdiet-config
              key: CORS_ORIGIN
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: warmdiet-secret
              key: JWT_SECRET
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: warmdiet-secret
              key: GEMINI_API_KEY
        - name: DATABASE_PATH
          value: "/app/data/warmdiet.db"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: warmdiet-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: warmdiet-service
  namespace: warmdiet
  labels:
    app: warmdiet
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: warmdiet
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800