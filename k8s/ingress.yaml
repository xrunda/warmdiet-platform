apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: warmdiet-ingress
  namespace: warmdiet
  annotations:
    # 阿里云 Ingress 注解
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # 阿里云 SLB 配置
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-spec: |
      {
        "load_balancer_spec": "slb.s3.small"
      }
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - warmdiet.example.com  # 替换为你的域名
    secretName: warmdiet-tls  # TLS 证书 Secret
  rules:
  - host: warmdiet.example.com  # 替换为你的域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: warmdiet-service
            port:
              number: 80